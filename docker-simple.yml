services:
  meshmonitor:
    image: ghcr.io/yeraze/meshmonitor:latest
    container_name: meshmonitor
    ports:
      - "8080:3001"
    volumes:
      - meshmonitor-data:/data
    restart: unless-stopped
    # MeshMonitor 4.0+: configure your Meshtastic source (host/port) through
    # the Dashboard UI after first boot. Sign in as admin (default: admin/changeme)
    # and click "+ Add Source".

volumes:
  meshmonitor-data:
